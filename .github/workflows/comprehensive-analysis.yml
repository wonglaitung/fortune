name: 综合分析邮件提醒

on:
  schedule:
    # 每天港股交易时段执行 (周一到周五，下午4:00 HK时间)
    - cron: '18 8 * * 1-5'
  # 可选：允许手动触发
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Hong_Kong
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run comprehensive analysis script
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECIPIENT_EMAIL: mall_cn@hotmail.com, wonglaitung@gmail.com
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          QWEN_CHAT_URL: ${{ secrets.QWEN_CHAT_URL }}
          QWEN_CHAT_MODEL: ${{ secrets.QWEN_CHAT_MODEL }}
        run: |
          bash scripts/run_comprehensive_analysis.sh

      - name: Commit prediction history
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git pull --rebase origin main || true
          git add data/prediction_history.json || true
          if ! git diff --staged --quiet; then
            git commit -m "Update prediction history [skip ci]"
            git push
          else
            echo "没有新的预测历史需要提交"
          fi
