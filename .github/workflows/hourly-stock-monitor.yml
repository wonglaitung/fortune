name: 港股异常检测（每小时）

on:
  schedule:
    # 香港交易时段（UTC 时间）：
    # 上午盘 09:30-12:00 HKT = 01:30-04:00 UTC → 02:00, 03:00, 04:00
    # 下午盘 13:00-16:00 HKT = 05:00-08:00 UTC → 05:00, 06:00, 07:00
    - cron: '0 2,3,4,5,6,7 * * 1-5'  # UTC 时间，对应香港时间 10:00, 11:00, 12:00, 13:00, 14:00, 15:00
  # 可选：允许手动触发
  workflow_dispatch:
    inputs:
      time_interval:
        description: '时间间隔（day 或 hour）'
        required: false
        default: 'hour'
        type: choice
        options:
          - hour
          - day
      mode_type:
        description: '检测模式（quick 或 deep）'
        required: false
        default: 'deep'
        type: choice
        options:
          - quick
          - deep

jobs:
  detect-anomalies:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Hong_Kong
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run stock anomaly detection (deep mode)
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        run: |
          python3 detect_stock_anomalies.py --mode standalone --mode-type deep --time-interval hour

      - name: Manual trigger mode
        if: github.event_name == 'workflow_dispatch'
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        run: |
          python3 detect_stock_anomalies.py \
            --mode standalone \
            --mode-type ${{ github.event.inputs.mode_type }} \
            --time-interval ${{ github.event.inputs.time_interval }}
