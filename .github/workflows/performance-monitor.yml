name: 预测性能月度报告

on:
  schedule:
    # 每个工作日 UTC 16:00 (HK 时间凌晨0:00)
    - cron: '0 16 * * 1-5'
  # 允许手动触发
  workflow_dispatch:

jobs:
  performance-report:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Hong_Kong
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install markdown

      - name: Run performance monitor
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        run: |
          python3 ml_services/performance_monitor.py --mode all --horizon 20

      - name: Commit updated history
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # 添加文件
          git add data/prediction_history.json output/performance_report_*.md

          # 检查是否有更改
          if git diff --staged --quiet; then
            echo "没有新的性能监控数据需要提交"
            exit 0
          fi

          # 提交
          if ! git commit -m "Update performance monitoring data [skip ci]"; then
            echo "提交失败"
            exit 1
          fi

          # 拉取并变基（最多重试3次）
          PULL_SUCCESS=false
          for i in 1 2 3; do
            if git pull --rebase origin main; then
              PULL_SUCCESS=true
              break
            fi
            echo "重试 $i/3: 拉取失败，等待5秒后重试..."
            sleep 5
          done

          if [ "$PULL_SUCCESS" = false ]; then
            echo "拉取失败，放弃推送"
            exit 1
          fi

          # 推送（最多重试3次）
          for i in 1 2 3; do
            if git push origin main; then
              echo "推送成功"
              exit 0
            fi
            echo "重试 $i/3: 推送失败，等待5秒后重试..."
            sleep 5
          done

          echo "推送失败，请手动检查"
          exit 1