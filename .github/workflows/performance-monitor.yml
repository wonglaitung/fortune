name: 预测性能月度报告

on:
  schedule:
    # 每月1号上午4:00 HK时间 (UTC 20:00 前一天)
    - cron: '0 20 28-31 * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  check-date:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Hong_Kong
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check if tomorrow is 1st
        id: check
        run: |
          tomorrow=$(date -d "+1 day" +%d)
          if [ "$tomorrow" = "01" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  performance-report:
    needs: check-date
    if: needs.check-date.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Hong_Kong
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install markdown

      - name: Run performance monitor
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECIPIENT_EMAIL: mall_cn@hotmail.com, wonglaitung@gmail.com
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        run: |
          python3 ml_services/performance_monitor.py --mode all --horizon 20

      - name: Commit updated history
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # 先拉取远程更新
          git fetch origin main
          # 如果本地有未提交的更改，先暂存
          if ! git diff --quiet; then
            git stash push -m "Temporarily stash changes before rebase"
          fi
          # 尝试rebase
          if git rebase origin/main; then
            # rebase成功，恢复之前暂存的更改
            if git stash list | grep -q "Temporarily stash changes before rebase"; then
              git stash pop
            fi
          else
            # rebase失败，中止rebase
            git rebase --abort
            # 恢复之前暂存的更改
            if git stash list | grep -q "Temporarily stash changes before rebase"; then
              git stash pop
            fi
            # 使用merge代替rebase
            git merge origin/main -m "Merge remote changes before updating performance data"
          fi
          # 添加文件
          git add data/prediction_history.json output/performance_report_*.md
          # 检查是否有更改需要提交
          if ! git diff --staged --quiet; then
            git commit -m "Update performance monitoring data [skip ci]"
            # 推送时处理可能的冲突
            if ! git push; then
              # 推送失败，拉取最新更改
              git pull --rebase origin main
              # 再次尝试推送
              git push
            fi
          else
            echo "没有新的性能监控数据需要提交"
          fi